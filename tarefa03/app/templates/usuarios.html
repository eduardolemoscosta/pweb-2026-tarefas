<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>
</head>
<body>
    <h1>Usuários Cadastrados</h1>
    
    <ul>
        {% for usuario in usuarios %}
        
        <li>
            <strong>{{ usuario.nome }}</strong> - Matrícula: {{ usuario.matricula }} | Idade: {{ usuario.idade }} anos | Cidade: {{ usuario.cidade }}
        </li>
        
        {% endfor %}
        </ul>

    <br>
    <a href="/">Voltar para a página inicial</a>
</body>
</html>
